id: phase4-dual-prescriptions
name: "Phase 4: generate dual-option prescriptions A and B"
description: Agent must provide two prescription options per failure - Prescription A (conservative) and Prescription B (structural)
tags:
  - phase4
  - diagnostic-report
inputs:
  prompt: "For each failing task, give me both a minimal fix and a structural fix"
expected:
  should_trigger: true
graders:
  - type: text
    name: dual-prescriptions
    config:
      contains:
        - "Prescription A"
        - "Prescription B"
        - "conservative"
        - "structural"
