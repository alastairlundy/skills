name: waza-skill-evaluator-eval
description: Evaluate the waza-skill-evaluator skill's trigger accuracy, prerequisite workflow, suite validation workflow, and diagnostic report generation
skill: waza-skill-evaluator
version: "1.0"

config:
  trials_per_task: 3
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: auto

metrics:
  - name: pass_rate
    weight: 1.0
    threshold: 0.7
    description: Fraction of tasks whose graders all pass on every trial

tasks:
  - "../tasks/*.yaml"
