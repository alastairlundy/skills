id: no-trigger-trivial-change
name: No Trigger Trivial Change
description: >-
  Does NOT trigger when user wants to make a trivial change to an existing skill.
tags:
  - trigger
  - negative-trigger
inputs:
  prompt: |
    Can you fix a typo in the ask-questions SKILL.md file?
expected:
  should_trigger: false
graders:
  - type: trigger
    name: trigger-grader
    config:
      skill_path: skills/skills-meta/skill-architect
      mode: negative
      threshold: 0.5
