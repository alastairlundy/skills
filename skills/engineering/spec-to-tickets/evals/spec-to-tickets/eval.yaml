name: spec-to-tickets
description: >-
  Evaluates spec-to-tickets skill trigger discipline (when to use, when to defer) and performance
  on the 24+ validation checks defined in SKILL.md. Performance tasks are grouped: ticket shape,
  dependency graph, workflow steps, trigger discipline, context pointers, abbreviations, pattern
  choice, and sizing rules.
skill: spec-to-tickets
version: "1.0"

config:
  trials_per_task: 3
  timeout_seconds: 300
  parallel: false
  executor: mock
  model: gpt-5-mini

tasks:
  - "tasks/*.yaml"
