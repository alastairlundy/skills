id: perf-sizing
type: performance
description: >-
  Ticket count is at least 2 (unless the spec is narrowly scoped). Each ticket satisfies
  the coherence primitive (single mergeable change, reviewable unit, single logical concern).
  Relative-size signals (file count, Large labels) are present for tickets that involve files.
input: |
  Decompose this spec into tickets:

  # Image Upload Pipeline

  **Problem**: Image uploads are slow and lack validation.

  **Approach**: Add client-side compression, server-side virus scan, S3 storage, thumbnail generation.

  **Scope**: Frontend compression, upload endpoint, scan integration, S3 client, thumbnail service.

  **Acceptance**: User uploads a 5MB image; it appears as thumbnails within 5 seconds.
assertion: |
  Output contains at least 2 tickets, unless the spec is already narrowly scoped (one well-defined unit of work). Each ticket satisfies the coherence primitive — it is a single mergeable change, a reviewable unit, and addresses a single logical concern. All tickets collectively work toward the shared objective. For tickets that involve files, the output includes file count and applies "Large Files to be created" or "Large Edits required" labels where thresholds are met.
