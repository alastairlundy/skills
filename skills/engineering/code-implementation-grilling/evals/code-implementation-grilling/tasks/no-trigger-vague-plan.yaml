id: no-trigger-vague-plan
name: No Trigger Vague Plan
description: >-
  Does NOT trigger on a bare 'plan' mention with no spec/PRD present.
tags:
  - trigger
  - negative-trigger
inputs:
  prompt: |
    I have a plan for a todo app.
expected:
  should_trigger: false
graders:
  - type: trigger
    name: trigger-grader
    config:
      skill_path: skills/engineering/code-implementation-grilling
      mode: negative
      threshold: 0.5
