id: perf-handoff-text-is-fixed-template
name: Perf Handoff Text Is Fixed Template
description: >-
  Terminal Output uses one of the pre-written handoff templates verbatim, with only <spec-path> and <blueprint-path> substituted. No fabricated section numbers, step counts, or 'section N of' framing.
tags:
  - performance
inputs:
  prompt: |
    Spec at docs/prds/feature-x.md: build a CLI tool that watches a directory for new markdown files and indexes them into SQLite. Run code-implementation-grilling.
expected:
  output_contains:
    - "section 3 of 5"
    - "step 5 of 6"
  output_not_contains:
    - "section N of M"
graders:
  - type: text
    name: assertion-checks
    config:
      not_contains:
        - "section N of M"
      contains:
        - "section 3 of 5"
        - "step 5 of 6"
