id: perf-interfaces-one-type-per-turn
name: Perf Interfaces One Type Per Turn
description: >-
  Interface & Model Branch (Step 3) introduces types one at a time with a visible running checklist, and does not present a single 'approve the interface spec as written' gate covering all types.
tags:
  - performance
inputs:
  prompt: |
    Spec at docs/prds/order-service.md: order service with Order, OrderLine, Customer, Address, Payment, Shipment. Run code-implementation-grilling through to interfaces.
expected:
  output_contains:
    - "Introduced: A, B, C — remaining: D, E, F"
  output_not_contains:
    - "Do you approve the interface spec as written?"
graders:
  - type: text
    name: assertion-checks
    config:
      not_contains:
        - "Do you approve the interface spec as written?"
      contains:
        - "Introduced: A, B, C — remaining: D, E, F"
