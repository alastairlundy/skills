id: perf-blueprint-filename-derived-from-spec
name: Perf Blueprint Filename Derived From Spec
description: >-
  Step 4 confirmation prompt shows the blueprint filename derived from the spec's identifying token, not the hard-coded IMPLEMENTATION.md.
tags:
  - performance
inputs:
  prompt: |
    Spec at docs/prds/feature-x.md: build a CLI todo app. Run code-implementation-grilling.
expected:
  output_contains:
    - "m going to write the blueprint to IMPLEMENTATION-feature-x.md ..."
graders:
  - type: text
    name: assertion-checks
    config:
      contains:
        - "m going to write the blueprint to IMPLEMENTATION-feature-x.md ..."
