id: no-trigger-domain-modeling
name: No Trigger Domain Modeling
description: >-
  Does NOT trigger for a domain modeling or terminology alignment question.
tags:
  - trigger
  - negative-trigger
inputs:
  prompt: |
    What's the bounded context for orders vs invoices in a multi-tenant SaaS?
expected:
  should_trigger: false
graders:
  - type: trigger
    name: trigger-grader
    config:
      skill_path: skills/engineering/code-implementation-grilling
      mode: negative
      threshold: 0.5
