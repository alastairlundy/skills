id: perf-no-skill-names-mid-workflow
name: Perf No Skill Names Mid Workflow
description: >-
  Workflow body (Steps 1-5) does not name a specific downstream skill; skill names appear only in the Terminal Output section's pre-written handoff templates.
tags:
  - performance
inputs:
  prompt: |
    Spec at docs/prds/feature-x.md: build a CLI todo app. Run code-implementation-grilling.
expected:
  output_contains:
    - "spec-to-tickets"
    - "to-issues"
    - "s downstream-consumer choice may use generic labels ("
graders:
  - type: text
    name: assertion-checks
    config:
      contains:
        - "spec-to-tickets"
        - "to-issues"
        - "s downstream-consumer choice may use generic labels ("
