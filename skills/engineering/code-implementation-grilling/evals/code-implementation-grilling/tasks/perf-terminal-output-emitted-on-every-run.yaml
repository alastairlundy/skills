id: perf-terminal-output-emitted-on-every-run
name: Perf Terminal Output Emitted On Every Run
description: >-
  The Terminal Output (Required) block is emitted on every workflow run, not sometimes omitted.
tags:
  - performance
inputs:
  prompt: |
    Spec at docs/prds/payment-service.md: payment service with idempotent charges. Run code-implementation-grilling.
expected:
  output_contains:
    - "Terminal Output (Required)"
graders:
  - type: text
    name: assertion-checks
    config:
      contains:
        - "Terminal Output (Required)"
