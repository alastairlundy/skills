id: perf-foundation-checklist-resolved-atomically
name: Perf Foundation Checklist Resolved Atomically
description: >-
  Foundation checklist is resolved completely in a single code implementation plan, not partially or with items skipped.
tags:
  - performance
inputs:
  prompt: |
    Spec: a CLI todo app that stores tasks in a local JSON file. Features: add, list, complete, remove. Persistence: file-based, no network. Resolve the full technical foundation.
expected:
  output_contains:
    - "perf-foundation-checklist-resolved-atomically"
graders:
  - type: text
    name: assertion-checks
    config:
      contains:
        - "perf-foundation-checklist-resolved-atomically"
