id: perf-emoji-toggle-disabled
name: Perf Emoji Toggle Disabled
description: >-
  With `Use Emojis: No`, category headings appear as plain bold headings with no emoji prefix.
tags:
  - performance
inputs:
  prompt: |
    Generate a changelog for the repo between v1.0.0 and HEAD. Use Emojis: No.
expected:
  output_contains:
    - "perf-emoji-toggle-disabled"
graders:
  - type: text
    name: assertion-checks
    config:
      contains:
        - "perf-emoji-toggle-disabled"
