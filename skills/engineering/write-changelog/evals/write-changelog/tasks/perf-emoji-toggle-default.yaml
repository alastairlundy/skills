id: perf-emoji-toggle-default
name: Perf Emoji Toggle Default
description: >-
  With no `Use Emojis` input, the default (Yes) applies and emoji prefixes are present.
tags:
  - performance
inputs:
  prompt: |
    Generate a changelog for the repo between v1.0.0 and HEAD.
expected:
  output_contains:
    - "perf-emoji-toggle-default"
graders:
  - type: text
    name: assertion-checks
    config:
      contains:
        - "perf-emoji-toggle-default"
