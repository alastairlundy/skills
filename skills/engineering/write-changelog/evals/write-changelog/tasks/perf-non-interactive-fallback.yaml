id: perf-non-interactive-fallback
type: performance
description: Non-interactive run uses top-level-dirs grouping for Step 1 and "Global" as the default title for Step 4.
input: |
  Generate a changelog for the repo between v1.0.0 and HEAD. (No user input will be provided; treat this as a non-interactive run.)
assertion: |
  Output groups changes by top-level directories (excluding `docs/`, `.github/`, and `tests/`), matching the Step 1 no-project-files fallback. The first section's title is "Global" (the Step 4 fallback). No user prompts were issued during the run.
