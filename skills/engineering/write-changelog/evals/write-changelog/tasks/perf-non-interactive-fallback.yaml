id: perf-non-interactive-fallback
name: Perf Non Interactive Fallback
description: >-
  Non-interactive run uses top-level-dirs grouping for Step 1 and "Global" as the default title for Step 4.
tags:
  - performance
inputs:
  prompt: |
    Generate a changelog for the repo between v1.0.0 and HEAD. (No user input will be provided; treat this as a non-interactive run.)
expected:
  output_contains:
    - "Global"
graders:
  - type: text
    name: assertion-checks
    config:
      contains:
        - "Global"
