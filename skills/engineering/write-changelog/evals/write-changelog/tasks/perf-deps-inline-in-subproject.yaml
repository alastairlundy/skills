id: perf-deps-inline-in-subproject
name: Perf Deps Inline In Subproject
description: >-
  Dependency updates within a sub-project appear inline as `⚙️ Modifications` inside that sub-project's section, not under Global.
tags:
  - performance
inputs:
  prompt: |
    Generate a changelog for this monorepo between v2.0.0 and HEAD. The `packages/api` sub-project had its `package.json` dependency on `express` bumped from 4.x to 5.x.
expected:
  output_contains:
    - "Global"
    - "Runtime Dependencies"
    - "CI Dependencies"
    - "Testing Dependencies"
graders:
  - type: text
    name: assertion-checks
    config:
      contains:
        - "Global"
        - "Runtime Dependencies"
        - "CI Dependencies"
        - "Testing Dependencies"
