id: perf-uses-ask-questions-skill
name: Perf Uses Ask Questions Skill
description: >-
  Step 4's clarification goes through the ask-questions four-gate procedure rather than a bare 4-option question.
tags:
  - performance
inputs:
  prompt: |
    Generate a changelog for the repo between v1.0.0 and HEAD. (The repo structure is ambiguous between single-project and monorepo; treat this as an interactive run.)
expected:
  output_contains:
    - "s trace shows the ask-questions skill"
    - "Global / All Packages / All Projects / Other (specify)"
graders:
  - type: text
    name: assertion-checks
    config:
      contains:
        - "s trace shows the ask-questions skill"
        - "Global / All Packages / All Projects / Other (specify)"
