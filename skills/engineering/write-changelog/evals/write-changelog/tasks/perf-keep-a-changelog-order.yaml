id: perf-keep-a-changelog-order
name: Perf Keep A Changelog Order
description: >-
  Category headings appear in Keep-a-Changelog order, with Security omitted.
tags:
  - performance
inputs:
  prompt: |
    Generate a changelog for the repo between v1.0.0 and HEAD. The repo has commits spanning all categories (additions, modifications, deprecations, removals, bug fixes, non-source-code).
expected:
  output_contains:
    - "Security"
graders:
  - type: text
    name: assertion-checks
    config:
      contains:
        - "Security"
