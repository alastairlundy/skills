id: perf-count-gate-characters
name: Perf Count Gate Characters
description: >-
  Constructs a tool call that satisfies the Count Gate (1-3 questions, 2-4 options, ≤80-char descriptions, ≤30-char headers).
tags:
  - performance
inputs:
  prompt: |
    I need to pick a database for our new web service. Should I use Postgres, MySQL, or MongoDB?
expected:
  output_contains:
    - "perf-count-gate-characters"
graders:
  - type: text
    name: assertion-checks
    config:
      contains:
        - "perf-count-gate-characters"
