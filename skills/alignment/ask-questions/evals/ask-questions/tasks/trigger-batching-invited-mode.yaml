id: trigger-batching-invited-mode
name: Trigger Batching Invited Mode
description: >-
  Triggers in invited mode where batching (2-3 questions per call) is permitted.
tags:
  - trigger
  - positive-trigger
inputs:
  prompt: |
    Grill me on the architecture for a new payment service. Ask me everything you need to know.
expected:
  should_trigger: true
graders:
  - type: trigger
    name: trigger-grader
    config:
      skill_path: skills/alignment/ask-questions
      mode: positive
      threshold: 0.5
