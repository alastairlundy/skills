id: no-trigger-open-ended
name: No Trigger Open Ended
description: >-
  Does NOT trigger when the LLM is about to call ask_question for an open-ended exploratory question.
tags:
  - trigger
  - negative-trigger
inputs:
  prompt: |
    Tell me about the different approaches to handling state in distributed systems.
expected:
  should_trigger: false
graders:
  - type: trigger
    name: trigger-grader
    config:
      skill_path: skills/alignment/ask-questions
      mode: negative
      threshold: 0.5
