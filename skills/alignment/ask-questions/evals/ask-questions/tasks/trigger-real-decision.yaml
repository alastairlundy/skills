id: trigger-real-decision
name: Trigger Real Decision
description: >-
  Triggers when the LLM is about to call ask_question tool with a real decision question.
tags:
  - trigger
  - positive-trigger
inputs:
  prompt: |
    I need to pick a database for our new service. Should I use PostgreSQL or MySQL?
expected:
  should_trigger: true
graders:
  - type: trigger
    name: trigger-grader
    config:
      skill_path: skills/alignment/ask-questions
      mode: positive
      threshold: 0.5
