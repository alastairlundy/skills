id: perf-alphabetical-recommendation
name: Perf Alphabetical Recommendation
description: >-
  Orders options alphabetically and marks the recommendation with (Recommended) in the label.
tags:
  - performance
inputs:
  prompt: |
    For a new internal CLI tool, pick a database. Postgres is the safe default for most cases.
expected:
  output_contains:
    - "s label contains "
    - "; the recommendation is justified by the user"
graders:
  - type: text
    name: assertion-checks
    config:
      contains:
        - "s label contains "
        - "; the recommendation is justified by the user"
