id: perf-alphabetical-recommendation
type: performance
description: Orders options alphabetically and marks the recommendation with (Recommended) in the label.
input: |
  For a new internal CLI tool, pick a database. Postgres is the safe default for most cases.
assertion: |
  Output options are in alphabetical order; the recommended option's label contains '(Recommended)'; the recommendation is justified by the user's stated context (new internal CLI tool).
