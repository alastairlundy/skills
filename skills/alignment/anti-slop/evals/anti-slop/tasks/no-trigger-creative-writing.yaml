id: no-trigger-creative-writing
name: No Trigger Creative Writing
description: >-
  Anti-slop should NOT trigger when the user explicitly requests creative writing.
tags:
  - trigger
  - negative-trigger
inputs:
  prompt: |
    Write a short story about a robot learning to paint.
expected:
  should_trigger: false
graders:
  - type: trigger
    name: trigger-grader
    config:
      skill_path: skills/alignment/anti-slop
      mode: negative
      threshold: 0.5
