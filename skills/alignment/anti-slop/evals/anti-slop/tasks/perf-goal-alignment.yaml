id: perf-goal-alignment
name: Perf Goal Alignment
description: >-
  Prunes tangential sentences that do not advance the Goal Constraint.
tags:
  - performance
inputs:
  prompt: |
    Goal: Reduce API latency by 200ms. Draft: 'The API was introduced in 2019. It has three components. To reduce latency, add a cache layer.'
expected:
  output_contains:
    - "perf-goal-alignment"
graders:
  - type: text
    name: assertion-checks
    config:
      contains:
        - "perf-goal-alignment"
