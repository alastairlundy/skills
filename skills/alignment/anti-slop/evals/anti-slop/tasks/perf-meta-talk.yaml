id: perf-meta-talk
name: Perf Meta Talk
description: >-
  Removes meta-talk framing.
tags:
  - performance
inputs:
  prompt: |
    It's important to note that the system has three components.
expected:
  output_not_contains:
    - "It is worth noting"
    - "In conclusion"
    - "Let me explain"
    - "Great question"
graders:
  - type: text
    name: assertion-checks
    config:
      not_contains:
        - "It is worth noting"
        - "In conclusion"
        - "Let me explain"
        - "Great question"
      contains:
        - "perf-meta-talk"
