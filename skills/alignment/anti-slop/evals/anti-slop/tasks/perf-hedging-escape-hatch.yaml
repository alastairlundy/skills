id: perf-hedging-escape-hatch
name: Perf Hedging Escape Hatch
description: >-
  Replaces hedging with explicit conditional alternative.
tags:
  - performance
inputs:
  prompt: |
    Depending on your needs, you could use Kafka or RabbitMQ.
expected:
  output_contains:
    - "If X, use Kafka; if Y, use RabbitMQ"
  output_not_contains:
    - "depending on"
graders:
  - type: text
    name: assertion-checks
    config:
      not_contains:
        - "depending on"
      contains:
        - "If X, use Kafka; if Y, use RabbitMQ"
