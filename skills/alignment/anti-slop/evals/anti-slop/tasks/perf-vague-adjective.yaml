id: perf-vague-adjective
name: Perf Vague Adjective
description: >-
  Replaces a vague adjective with a measurable specification.
tags:
  - performance
inputs:
  prompt: |
    Implement a robust organizational strategy for the data.
expected:
  output_not_contains:
    - "delve"
    - "tapestry"
    - "multifaceted"
    - "comprehensive"
    - "seamless"
    - "cutting-edge"
    - "leverage"
    - "utilize"
graders:
  - type: text
    name: assertion-checks
    config:
      not_contains:
        - "delve"
        - "tapestry"
        - "multifaceted"
        - "comprehensive"
        - "seamless"
        - "cutting-edge"
        - "leverage"
        - "utilize"
      contains:
        - "perf-vague-adjective"
