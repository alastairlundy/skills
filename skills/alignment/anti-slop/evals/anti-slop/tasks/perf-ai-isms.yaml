id: perf-ai-isms
name: Perf Ai Isms
description: >-
  Sanitizes AI-isms in a draft sentence.
tags:
  - performance
inputs:
  prompt: |
    Let's delve into the multifaceted tapestry of this API.
expected:
  output_not_contains:
    - "embark"
    - "navigate the landscape"
    - "in the realm of"
graders:
  - type: text
    name: assertion-checks
    config:
      not_contains:
        - "embark"
        - "navigate the landscape"
        - "in the realm of"
      contains:
        - "perf-ai-isms"
